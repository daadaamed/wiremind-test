apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-wiremind
  namespace: hello-app
  labels:
    app: hello-wiremind
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-wiremind
  template:
    metadata:
      labels:
        app: hello-wiremind
    spec:
      containers:
        - name: hello-wiremind
          image: europe-west4-docker.pkg.dev/mohamed-wiremind-test/wiremind-hello/hello-wiremind:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
